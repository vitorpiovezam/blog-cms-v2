service: blog-cms-v2
frameworkVersion: '3'

provider:
  name: aws
  runtime: provided.al2023
  region: us-east-1
  architecture: x86_64
  apiGateway:
    minimumCompressionSize: 1024
    shouldStartNameWithService: true
  environment:
    POSTS_PATH: src/posts
    ASSETS_PATH: src/assets
    COMMENTS_TABLE: blog-comments
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt CommentsTable.Arn

package:
  individually: true
  # Artifact built by `make package` (scripts/mkzip.py bundles src/posts/*.md and src/assets/**).

functions:
  getAllPosts:
    handler: bootstrap
    package:
      artifact: .bin/bootstrap.zip
    events:
      - http:
          method: GET
          path: /posts
          cors: true

  getPostBySlug:
    handler: bootstrap
    package:
      artifact: .bin/bootstrap.zip
    events:
      - http:
          method: GET
          path: /post/{slug}
          cors: true

  getComments:
    handler: bootstrap
    package:
      artifact: .bin/bootstrap.zip
    events:
      - http:
          method: GET
          path: /post/{slug}/comments
          cors: true

  postComment:
    handler: bootstrap
    package:
      artifact: .bin/bootstrap.zip
    events:
      - http:
          method: POST
          path: /post/{slug}/comments
          cors: true

  recommendComment:
    handler: bootstrap
    package:
      artifact: .bin/bootstrap.zip
    events:
      - http:
          method: POST
          path: /post/{slug}/comments/{commentId}/recommend
          cors: true

resources:
  Resources:
    CommentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: blog-comments
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: slug
            AttributeType: S
          - AttributeName: commentId
            AttributeType: S
        KeySchema:
          - AttributeName: slug
            KeyType: HASH
          - AttributeName: commentId
            KeyType: RANGE
